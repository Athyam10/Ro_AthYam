<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HSV Brightness Popup</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

/* Open button */
.open-btn{
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #007BFF;
    color: white;
    cursor: pointer;
}

/* Popup background */
.popup{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);

    justify-content: center;
    align-items: center;
}

/* Popup box */
.popup-content{

    background: white;

    width: 92%;
    max-width: 1400px;

    padding: 30px;

    border-radius: 15px;

    text-align: center;
}

/* Images row */
.image-row{

    display: flex;

    justify-content: center;

    align-items: flex-start;

    gap: 40px;

    margin-top: 30px;

    flex-wrap: wrap;
}

/* Original image + canvas */
img,
canvas{

    width: 500px;

    max-width: 100%;

    max-height: 500px;

    border: 2px solid #ccc;

    object-fit: contain;
}

/* Controls */
.controls{

    display: flex;

    justify-content: center;

    gap: 15px;

    margin-top: 20px;

    flex-wrap: wrap;
}

/* Buttons */
button{

    padding: 10px 20px;

    border: none;

    border-radius: 8px;

    background: #007BFF;

    color: white;

    font-size: 16px;

    cursor: pointer;
}

/* Input */
input{

    padding: 10px;

    width: 250px;

    font-size: 16px;
}

</style>
</head>

<body>

<button class="open-btn" onclick="openPopup()">
    Open HSV Brightness Editor
</button>

<div id="popup" class="popup">

    <div class="popup-content">

        <button onclick="closePopup()">
            Close
        </button>

        <h1>HSV Brightness Editor</h1>

        <div class="controls">

            <input
                type="number"
                id="brightnessInput"
                placeholder="Brightness (-100 to 100)"
            >

            <button onclick="runConversion()">
                Update Brightness
            </button>

        </div>

        <div class="image-row">

            <div>

                <h2>Original Image</h2>

                <img
                    id="originalImage"
                    src="image.jpeg"
                >

            </div>

            <div>

                <h2>Edited Image</h2>

                <canvas id="convertedCanvas"></canvas>

            </div>

        </div>

    </div>

</div>

<script>

const originalImage = new Image();
originalImage.src = "image.jpeg";

const canvas =
    document.getElementById("convertedCanvas");

const ctx =
    canvas.getContext("2d");

// Open popup
function openPopup(){

    document.getElementById("popup").style.display = "flex";

    if(originalImage.complete){

        initializeCanvas();
    }
    else{

        originalImage.onload = initializeCanvas;
    }
}

// Close popup
function closePopup(){

    document.getElementById("popup").style.display = "none";
}

// Initial canvas setup
function initializeCanvas(){

    canvas.width = originalImage.width;
    canvas.height = originalImage.height;

    ctx.drawImage(originalImage,0,0);
}

// Main conversion
function runConversion(){

    let brightness =
        parseInt(
            document.getElementById("brightnessInput").value
        ) || 0;

    // Reset canvas to original image
    ctx.drawImage(originalImage,0,0);

    let imageData =
        ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        );

    let data = imageData.data;

    // Loop through pixels
    for(let i = 0; i < data.length; i += 4){

        let r = data[i] / 255;
        let g = data[i + 1] / 255;
        let b = data[i + 2] / 255;

        // RGB -> HSV
        let max = Math.max(r,g,b);
        let min = Math.min(r,g,b);
        let diff = max - min;

        let h,s,v;

        v = max;

        s = max === 0 ? 0 : diff / max;

        // Hue
        if(diff === 0){

            h = 0;
        }
        else if(max === r){

            h = (60 * ((g - b) / diff) + 360) % 360;
        }
        else if(max === g){

            h = (60 * ((b - r) / diff) + 120) % 360;
        }
        else{

            h = (60 * ((r - g) / diff) + 240) % 360;
        }

        // Same brightness logic as Python
        if(brightness > 0){

            v = Math.min(
                1,
                v + (brightness / 100)
            ) - (40 / 255);
        }
        else{

            v = Math.max(
                0,
                v + (brightness / 100)
            );
        }

        // Clamp again
        v = Math.max(0,Math.min(1,v));

        // HSV -> RGB
        let c = v * s;

        let x =
            c * (
                1 -
                Math.abs((h / 60) % 2 - 1)
            );

        let m = v - c;

        let r1,g1,b1;

        if(h < 60){

            r1 = c;
            g1 = x;
            b1 = 0;
        }
        else if(h < 120){

            r1 = x;
            g1 = c;
            b1 = 0;
        }
        else if(h < 180){

            r1 = 0;
            g1 = c;
            b1 = x;
        }
        else if(h < 240){

            r1 = 0;
            g1 = x;
            b1 = c;
        }
        else if(h < 300){

            r1 = x;
            g1 = 0;
            b1 = c;
        }
        else{

            r1 = c;
            g1 = 0;
            b1 = x;
        }

        // Convert back
        data[i]     = Math.round((r1 + m) * 255);
        data[i + 1] = Math.round((g1 + m) * 255);
        data[i + 2] = Math.round((b1 + m) * 255);
    }

    // Update edited image
    ctx.putImageData(imageData,0,0);
}

</script>

</body>
</html>
